name: Supply Chain

# ------------------------------------------------------------------------------
# Workflow Settings
# ------------------------------------------------------------------------------

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  # ----------------------------------------------------------------------------
  # Security Audit
  # ----------------------------------------------------------------------------

  security-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@10c3493d811a9096cee4fdf287e41e852f6a51ba # 1.94.0

      - name: Cache cargo binaries
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-cargo-bin-audit

      - name: Install cargo-audit
        run: command -v cargo-audit || cargo install cargo-audit --locked

      - name: Run cargo audit
        run: cargo audit

  # ----------------------------------------------------------------------------
  # License & Dependency Check
  # ----------------------------------------------------------------------------

  dependency-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@10c3493d811a9096cee4fdf287e41e852f6a51ba # 1.94.0

      - name: Cache cargo binaries
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-cargo-bin-deny

      - name: Install cargo-deny
        run: command -v cargo-deny || cargo install cargo-deny --locked

      - name: Run cargo deny
        run: cargo deny check
