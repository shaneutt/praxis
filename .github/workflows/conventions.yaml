name: Coding Conventions

# ------------------------------------------------------------------------------
# Workflow Settings
# ------------------------------------------------------------------------------

on:
  pull_request_target:
    branches: [ main ]
    types: [ opened, synchronize, reopened, ready_for_review ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions: {}

jobs:
  # ----------------------------------------------------------------------------
  # PR Size Check
  # ----------------------------------------------------------------------------

  pr-size-check:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-24.04
    steps:
      - name: Check PR size
        env:
          GH_TOKEN: ${{ secrets.PRAXIS_BOT }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          MAX_ADDITIONS: "250"
        run: |
          labels=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json labels -q '.labels[].name')
          if echo "$labels" | grep -q '^conventions/bypass$'; then
            echo "conventions/bypass label present — skipping size check"
            exit 0
          fi

          if [ "${{ github.event.action }}" = "reopened" ]; then
            perm=$(gh api repos/${{ github.repository }}/collaborators/${{ github.event.sender.login }}/permission -q .permission)
            if [ "$perm" = "admin" ] || [ "$perm" = "maintain" ]; then
              gh pr edit "$PR_NUMBER" --repo "${{ github.repository }}" --add-label "conventions/bypass"
              echo "Maintainer reopened — added conventions/bypass label"
              exit 0
            fi
          fi

          added=$(gh api "repos/${{ github.repository }}/pulls/${PR_NUMBER}/files" --paginate \
            --jq '[.[] | select(.filename | test("^(Cargo\\.lock|examples/)") | not) | .additions] | add // 0')

          if [ "$added" -gt "$MAX_ADDITIONS" ]; then
            marker="<!-- praxis:pr-size-check -->"
            already=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
              --jq "[.[] | select(.body | contains(\"${marker}\"))] | length")
            if [ "$already" -eq 0 ]; then
              body="${marker}
          ### PR too large

          This PR adds **${added} lines** (limit: **${MAX_ADDITIONS}**).

          Large PRs are difficult to review and more likely to introduce subtle bugs. Please break this contribution into smaller, focused PRs that each address a single concern.

          See our [coding conventions](docs/conventions.md) for guidance.

          > If this PR legitimately requires a large change, a maintainer can add the \`conventions/bypass\` label to skip this check."
              gh pr comment "$PR_NUMBER" --repo "${{ github.repository }}" --body "$body"
            fi
            gh pr close "$PR_NUMBER" --repo "${{ github.repository }}"
          fi

  # ----------------------------------------------------------------------------
  # PR Description Check
  # ----------------------------------------------------------------------------

  pr-description-check:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-24.04
    steps:
      - name: Check for description
        env:
          GH_TOKEN: ${{ secrets.PRAXIS_BOT }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          word_count=$(echo "$PR_BODY" | wc -w)
          if [ "$word_count" -lt 2 ]; then # minimum "fixes <issue_number>"
            gh pr comment "$PR_NUMBER" --repo "${{ github.repository }}" \
              --body "Please add a description to this PR explaining what it does and why. See our [coding conventions](docs/conventions.md)."
          fi

  # ----------------------------------------------------------------------------
  # Signed Commits Check
  # ----------------------------------------------------------------------------

  signed-commits-check:
    if: |
      !startsWith(github.head_ref, 'release-notes/pr-') ||
      github.event.pull_request.user.login != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - name: Check signed commits in PR
        env:
          GH_TOKEN: ${{ secrets.PRAXIS_BOT }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          unsigned=$(gh api "repos/${{ github.repository }}/pulls/${PR_NUMBER}/commits" \
            --paginate --jq '[.[] | select(.commit.verification.verified == false) | .sha[:7]] | join(", ")')

          if [ -n "$unsigned" ]; then
            marker="<!-- praxis:signed-commits-check -->"
            already=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
              --jq "[.[] | select(.body | contains(\"${marker}\"))] | length")
            if [ "$already" -eq 0 ]; then
              body="${marker}
          ### Unsigned commits detected

          The following commits are not signed: **${unsigned}**

          Please sign your commits. For instructions on how to set up GPG/SSH signing, see [GitHub Documentation](https://docs.github.com/en/authentication/managing-commit-signature-verification)."
              gh pr comment "$PR_NUMBER" --repo "${{ github.repository }}" --body "$body"
            fi
            echo "::error::Unsigned commits found: ${unsigned}"
            exit 1
          fi

  # ----------------------------------------------------------------------------
  # Copilot Reviewer
  # ----------------------------------------------------------------------------

  copilot-reviewer:
    if: >-
      github.event.action == 'opened' ||
      github.event.action == 'ready_for_review'
    runs-on: ubuntu-24.04
    steps:
      - name: Assign Copilot as reviewer
        env:
          GH_TOKEN: ${{ secrets.PRAXIS_BOT }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr edit "$PR_NUMBER" --repo "${{ github.repository }}" --add-reviewer @copilot
