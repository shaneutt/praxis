name: Container

# ------------------------------------------------------------------------------
# Workflow Settings
# ------------------------------------------------------------------------------

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  # -----------------------------------------------------------------
  # Build & Run Container
  # -----------------------------------------------------------------

  build-and-run:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build container image
        run: docker build -t praxis:ci -f Containerfile .

      - name: Run container
        run: docker run -d --name praxis praxis:ci

      - name: Wait for healthy
        run: |
          for i in $(seq 1 30); do
            status=$(docker inspect --format='{{.State.Health.Status}}' praxis 2>/dev/null || echo "starting")
            if [ "${status}" = "healthy" ]; then
              echo "Container is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "Container failed to become healthy"
          docker inspect --format='{{json .State.Health}}' praxis
          docker logs praxis
          exit 1

      - name: Stop container
        if: always()
        run: docker rm -f praxis
