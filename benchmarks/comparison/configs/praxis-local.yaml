# Praxis local benchmark config.
#
# Minimal reverse proxy for local (non-Docker) benchmark
# runs. Backend is the Fortio echo server on localhost.

listeners:
  - name: default
    address: "127.0.0.1:18090"
    filter_chains: [main]

filter_chains:
  - name: main
    filters:
      - filter: router
        routes:
          - path_prefix: "/"
            cluster: backend

      - filter: load_balancer
        clusters:
          - name: backend
            endpoints:
              - "127.0.0.1:18080"
