# HAProxy comparison benchmark config.
#
# Minimal reverse proxy equivalent to the Praxis config.
# Routes all traffic to the Fortio echo backend.

global
    maxconn 1024

defaults
    mode http
    timeout connect 5s
    timeout client  30s
    timeout server  30s
    option httplog
    no log

frontend http_front
    bind *:18093
    default_backend backend

backend backend
    server echo1 127.0.0.1:18080 check
