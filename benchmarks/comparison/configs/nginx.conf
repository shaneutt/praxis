# NGINX comparison benchmark config.
#
# Minimal reverse proxy equivalent to the Praxis config.
# Routes all traffic to the Fortio echo backend.

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    access_log off;

    upstream backend {
        server 127.0.0.1:18080;
    }

    server {
        listen 18092;

        location / {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
        }
    }
}
