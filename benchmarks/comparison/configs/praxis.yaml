# Praxis comparison benchmark config.
#
# Minimal reverse proxy: one listener, one route, one backend.
# Backend is the Fortio echo server on localhost.
# Uses --network host, so listens directly on the host.

listeners:
  - name: default
    address: "0.0.0.0:18090"
    filter_chains: [main]

filter_chains:
  - name: main
    filters:
      - filter: router
        routes:
          - path_prefix: "/"
            cluster: backend

      - filter: load_balancer
        clusters:
          - name: backend
            endpoints:
              - "127.0.0.1:18080"
