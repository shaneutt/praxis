# Session Affinity via Consistent Hashing
#
# Hashes a request header to pin a user's requests to one backend.
# Falls back to URI path when the header is absent. Adding or
# removing a backend re-hashes ~1/N of traffic.
#
# Usage:
#   cargo run -p praxis -- -c examples/configs/traffic-management/session-affinity.yaml
#   for i in $(seq 1 6); do
#     curl -H "X-User-Id: user-42" http://localhost:8080/
#   done

listeners:
  - name: default
    address: "127.0.0.1:8080"
    filter_chains:
      - main

filter_chains:
  - name: main
    filters:
      - filter: router
        routes:
          - path_prefix: "/"
            cluster: backend

      - filter: load_balancer
        clusters:
          - name: backend
            load_balancer_strategy:
              consistent_hash:
                header: "X-User-Id"   # omit to hash on URI path instead
            endpoints:
              - "127.0.0.1:3001"
              - "127.0.0.1:3002"
              - "127.0.0.1:3003"
